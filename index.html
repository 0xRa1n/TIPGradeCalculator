<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    body {
      background-color: #151617;
      color: white;
    }
  </style>
  <body>
    <div class="container mb-5 mt-5" id="container">
      <div class="row justify-content-md-center mt-5">
        <div class="col-md-12">
          <h1>Grade Calculator</h1>
          <div class="card">
            <div class="card-body">
              <div id="formsContainer">
                <h2>Assessment Tasks</h2>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="floatingInput"
                    placeholder="0"
                  />
                  <label for="floatingInput">Percentage</label>
                </div>
                <div class="assessment-row row g-3 mb-3">
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input
                        type="number"
                        class="form-control assessment-score"
                        id="scoreInput1"
                        placeholder="0"
                      />
                      <label for="scoreInput1">Score</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input
                        type="number"
                        class="form-control assessment-outof"
                        id="outOfInput1"
                        placeholder="0"
                      />
                      <label for="outOfInput1">Out Of</label>
                    </div>
                  </div>
                </div>
              </div>
              <div class="d-flex justify-content-end mt-3">
                <button id="addFormBtn" class="btn btn-primary" type="button">
                  Add
                </button>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-body">
              <div id="quizFormsContainer">
                <h2>Quiz</h2>
                <div class="form-floating mb-3">
                  <input
                    type="number"
                    class="form-control"
                    id="floatingQuizInput"
                    placeholder="0"
                  />
                  <label for="floatingQuizInput">Percentage</label>
                </div>
                <div class="quiz-row row g-3 mb-3">
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input
                        type="number"
                        class="form-control quiz-score"
                        id="quizScoreInput1"
                        placeholder="0"
                      />
                      <label for="quizScoreInput1">Score</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input
                        type="number"
                        class="form-control quiz-outof"
                        id="quizOutOfInput1"
                        placeholder="0"
                      />
                      <label for="quizOutOfInput1">Out Of</label>
                    </div>
                  </div>
                </div>
              </div>
              <div class="d-flex justify-content-end mt-3">
                <button
                  id="addQuizFormBtn"
                  class="btn btn-primary"
                  type="button"
                >
                  Add
                </button>
              </div>
            </div>
          </div>
          <div class="card mt-4">
            <div class="card-body">
              <div id="examFormsContainer">
                <h2>Exam</h2>
                <div class="exam-row row g-3 mb-3">
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input
                        type="number"
                        class="form-control exam-score"
                        id="examScoreInput1"
                        placeholder="0"
                      />
                      <label for="examScoreInput1">Score</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input
                        type="number"
                        class="form-control exam-outof"
                        id="examOutOfInput1"
                        placeholder="0"
                      />
                      <label for="examOutOfInput1">Out Of</label>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container mb-5">
      <div class="d-grid gap-2">
        <button id="calculateBtn" class="btn btn-primary" type="button">
          Calculate
        </button>
      </div>
      <div id="results" class="mt-3"></div>
    </div>

    <div
      class="modal fade"
      id="appErrorModal"
      tabindex="-1"
      aria-labelledby="appErrorModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="appErrorModalLabel">Error</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="appErrorModalBody"></div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"
  ></script>
  <script src="assets/js/script.js"></script>
</html>
